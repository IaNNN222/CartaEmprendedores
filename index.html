<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Raleway:wght@200&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0c0b0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'EB Garamond', serif;
    overflow: hidden;
  }

 
  #bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    position: relative;
    z-index: 10;
  }

  #flower {
    display: block;
  }

  .text-wrap {
    text-align: center;
    max-width: 360px;
    padding: 0 20px;
    opacity: 0;
    animation: fade-up 1.2s ease 2.4s forwards;
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .title {
    font-style: italic;
    font-size: clamp(1.3rem, 4vw, 1.7rem);
    color: #c8a84b;
    letter-spacing: 0.03em;
    margin-bottom: 16px;
    line-height: 1.3;
  }
  .rule {
    width: 30px; height: 1px;
    background: #5a4820;
    margin: 0 auto 16px;
  }
  .poem {
    font-style: italic;
    font-size: clamp(0.88rem, 2.5vw, 0.98rem);
    color: #5e5040;
    line-height: 2.1;
    letter-spacing: 0.02em;
  }
  .poem strong {
    color: #b89e60;
    font-weight: 400;
    font-style: normal;
  }
  .sig {
    margin-top: 20px;
    font-family: 'Raleway', sans-serif;
    font-weight: 200;
    font-size: 0.58rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #4a3818;
  }

  .glow {
    position: fixed;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,168,75,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -62%);
    pointer-events: none;
    z-index: 0;
    animation: breathe 6s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="glow"></div>
<canvas id="bg"></canvas>

<div class="scene">
  <canvas id="flower" width="220" height="300"></canvas>
  <div class="text-wrap">
    <div class="title">eres mi sol más cercano</div>
    <div class="rule"></div>
    <p class="poem">
      como esta flor que no pide permiso<br>
      para abrirse —<br>
      <strong>así te quiero.</strong><br><br>
      sin ruido. sin prisa.<br>
      con toda la luz<br>
      <strong>que me diste sin saber.</strong>
    </p>
    <p class="sig">— siempre —</p>
  </div>
</div>

<script>
// ─── FLOWER CANVAS ───────────────────────────────────────────────
const fc = document.getElementById('flower');
const ctx = fc.getContext('2d');

const CX = 110, CY = 130;
const STEM_BOT = 295;
const GOLD = '#c8a84b', GOLD_LIGHT = '#e8cc80', GOLD_DARK = '#8a6a20';
const STEM_COLOR = '#2a3a10';
const NUM_PETALS = 12, PETAL_LENGTH = 48, PETAL_WIDTH = 16;
const BLOOM_DURATION = 2000;

let flowerStart = null;
let flowerProgress = 0;

function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

function drawStem(p) {
  const top = STEM_BOT - p * (STEM_BOT - CY);
  ctx.save();
  ctx.strokeStyle = STEM_COLOR;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(CX, STEM_BOT);
  ctx.lineTo(CX, top);
  ctx.stroke();

  if (p > 0.4) {
    const lp = Math.min(1, (p - 0.4) / 0.3);
    ctx.globalAlpha = lp;
    ctx.save();
    ctx.translate(CX, STEM_BOT - 80);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(-28*lp,-10*lp,-38*lp,-22*lp,-20*lp,-30*lp);
    ctx.bezierCurveTo(-10*lp,-20*lp,-5*lp,-10*lp,0,0);
    ctx.fillStyle = STEM_COLOR; ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.translate(CX, STEM_BOT - 110);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(28*lp,-8*lp,40*lp,-20*lp,22*lp,-28*lp);
    ctx.bezierCurveTo(10*lp,-18*lp,4*lp,-8*lp,0,0);
    ctx.fillStyle = STEM_COLOR; ctx.fill();
    ctx.restore();
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function drawPetal(angle, petalProgress) {
  if (petalProgress <= 0) return;
  const p = easeOut(petalProgress);
  const len = PETAL_LENGTH * p;
  const wid = PETAL_WIDTH * p;
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.ellipse(0, -len * 0.55, wid * 0.5, len * 0.5, 0, 0, Math.PI * 2);
  const grad = ctx.createLinearGradient(0, 0, 0, -len);
  grad.addColorStop(0, GOLD_DARK);
  grad.addColorStop(0.4, GOLD);
  grad.addColorStop(1, GOLD_LIGHT);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = GOLD_DARK;
  ctx.lineWidth = 0.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, -len * 0.9);
  ctx.strokeStyle = 'rgba(200,168,75,0.2)';
  ctx.lineWidth = 0.6;
  ctx.stroke();
  ctx.restore();
}

function drawCenter(p) {
  if (p <= 0) return;
  ctx.save();
  ctx.translate(CX, CY);
  ctx.beginPath();
  ctx.arc(0, 0, 15 * p, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(0,0,0,0,0,15*p);
  grad.addColorStop(0, '#3a2a08');
  grad.addColorStop(0.6, '#1e1406');
  grad.addColorStop(1, '#0c0b0a');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = GOLD; ctx.lineWidth = 0.8; ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, 8 * p, 0, Math.PI * 2);
  ctx.strokeStyle = GOLD_DARK; ctx.lineWidth = 0.5; ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, 2 * p, 0, Math.PI * 2);
  ctx.fillStyle = GOLD; ctx.globalAlpha = 0.6; ctx.fill();
  ctx.restore();
}

let swayTime = 0;

function drawFlower(ts) {
  if (!flowerStart) flowerStart = ts;
  const elapsed = ts - flowerStart;
  flowerProgress = Math.min(1, elapsed / BLOOM_DURATION);
  swayTime = elapsed;

  const sway = flowerProgress === 1
    ? Math.sin(swayTime / 1000 * 0.7) * 0.022 : 0;

  ctx.clearRect(0, 0, fc.width, fc.height);
  ctx.save();
  ctx.translate(CX, STEM_BOT);
  ctx.rotate(sway);
  ctx.translate(-CX, -STEM_BOT);

  drawStem(easeOut(Math.min(1, flowerProgress / 0.35)));

  for (let i = 0; i < NUM_PETALS; i++) {
    const angle = (i / NUM_PETALS) * Math.PI * 2;
    const start = 0.3 + (i / NUM_PETALS) * 0.35;
    const pp = Math.max(0, Math.min(1, (flowerProgress - start) / 0.25));
    drawPetal(angle, pp);
  }

  drawCenter(Math.max(0, Math.min(1, (flowerProgress - 0.85) / 0.15)));
  ctx.restore();
}

// ─── BACKGROUND FALLING PETALS ───────────────────────────────────
const bg = document.getElementById('bg');
const bx = bg.getContext('2d');

function resizeBg() {
  bg.width = window.innerWidth;
  bg.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

const PETAL_COUNT = 38;
const petals = [];

function randomPetal() {
  return {
    x: Math.random() * window.innerWidth,
    y: -Math.random() * window.innerHeight, // start above screen
    len: 10 + Math.random() * 14,
    wid: 5 + Math.random() * 6,
    speed: 0.4 + Math.random() * 0.7,
    drift: (Math.random() - 0.5) * 0.4, // horizontal drift speed
    rot: Math.random() * Math.PI * 2,
    rotSpd: (Math.random() - 0.5) * 0.025,
    alpha: 0.08 + Math.random() * 0.22,
    swing: Math.random() * Math.PI * 2, // phase for pendulum swing
    swingAmp: 0.3 + Math.random() * 0.5,
  };
}

for (let i = 0; i < PETAL_COUNT; i++) {
  const p = randomPetal();
  p.y = Math.random() * window.innerHeight; // scatter initial positions
  petals.push(p);
}

function drawBgPetal(p) {
  bx.save();
  bx.translate(p.x, p.y);
  bx.rotate(p.rot);
  bx.globalAlpha = p.alpha;

  bx.beginPath();
  bx.ellipse(0, 0, p.wid * 0.5, p.len * 0.5, 0, 0, Math.PI * 2);

  const grad = bx.createLinearGradient(0, -p.len * 0.5, 0, p.len * 0.5);
  grad.addColorStop(0, '#8a6a20');
  grad.addColorStop(0.5, '#c8a84b');
  grad.addColorStop(1, '#e8cc80');
  bx.fillStyle = grad;
  bx.fill();

  bx.restore();
}

function updateBgPetals(ts) {
  bx.clearRect(0, 0, bg.width, bg.height);

  for (const p of petals) {
    // Pendulum side sway
    p.swing += 0.012;
    p.x += Math.sin(p.swing) * p.swingAmp + p.drift;
    p.y += p.speed;
    p.rot += p.rotSpd;

    // Reset when off screen
    if (p.y > bg.height + 20) {
      Object.assign(p, randomPetal());
      p.y = -20;
    }

    drawBgPetal(p);
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────
function loop(ts) {
  drawFlower(ts);
  updateBgPetals(ts);
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
